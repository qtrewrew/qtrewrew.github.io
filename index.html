<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blackforest</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            overflow: visible !important;
            position: static !important;
            transform: none !important;
        }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 120px; /* 给音乐播放器留空间 */
            position: relative;
        }

        /* 全局渐变背景 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #121212 60%);
            z-index: -2;
        }

        /* 星光背景 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        .star {
            position: absolute;
            background: rgba(255, 204, 85, 0.4);
            border-radius: 50%;
            animation: twinkle 3s infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.2; }
            100% { opacity: 1; }
        }

        /* 优化后的导航栏 - 更美观+强交互 */
        .nav {
            max-width: 800px;
            margin: 0 auto 30px;
            background: rgba(30,30,30,0.85);
            padding: 12px 20px;
            border-radius: 16px;
            display: flex;
            gap: 8px;
            border: 1px solid #444;
            position: relative;
            z-index: 10;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .nav a {
            color: #e0e0e0;
            text-decoration: none;
            font-size: 16px;
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 12px;
            position: relative;
            transition: all 0.3s ease;
            overflow: hidden;
        }
        /* 导航栏hover效果 */
        .nav a::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,204,85,0.1), transparent);
            transition: left 0.6s ease;
        }
        .nav a:hover {
            color: #ffcc55;
            background: rgba(50,50,50,0.5);
            transform: translateY(-2px);
        }
        .nav a:hover::before {
            left: 100%;
        }
        /* 导航栏激活态（可选，当前页面标记） */
        .nav a.active {
            background: rgba(255,204,85,0.2);
            color: #ffcc55;
            border: 1px solid rgba(255,204,85,0.3);
        }

        /* 首页艺术字样式（取消倾斜） */
        .home-container {
            display: flex;
            min-height: 60vh;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
            gap: 20px;
            position: relative;
            z-index: 5;
        }
        .art-text {
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: bold;
            color: #ffcc55;
            text-shadow: 
                0 0 10px rgba(255, 204, 85, 0.8),
                0 0 20px rgba(255, 204, 85, 0.6),
                0 0 30px rgba(255, 204, 85, 0.4),
                2px 2px 4px rgba(0, 0, 0, 0.8);
            font-family: "STKaiti", "KaiTi", serif;
            letter-spacing: 0.1em;
            transform: none;
            background: linear-gradient(120deg, #ffcc55, #ff9933, #ffcc55);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: glow 3s ease-in-out infinite alternate;
        }
        /* 副标题样式（取消倾斜） */
        .art-subtext {
            font-size: clamp(1rem, 2.5vw, 2rem);
            font-weight: bold;
            color: #ffcc55;
            text-shadow: 
                0 0 8px rgba(255, 204, 85, 0.8),
                0 0 15px rgba(255, 204, 85, 0.6),
                0 0 25px rgba(255, 204, 85, 0.4),
                1px 1px 3px rgba(0, 0, 0, 0.8);
            font-family: "STKaiti", "KaiTi", serif;
            letter-spacing: 0.2em;
            transform: none;
            background: linear-gradient(120deg, #ffcc55, #ff9933, #ffcc55);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: glow 3s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from {
                text-shadow: 
                    0 0 10px rgba(255, 204, 85, 0.8),
                    0 0 20px rgba(255, 204, 85, 0.6),
                    0 0 30px rgba(255, 204, 85, 0.4),
                    2px 2px 4px rgba(0, 0, 0, 0.8);
            }
            to {
                text-shadow: 
                    0 0 15px rgba(255, 204, 85, 1),
                    0 0 25px rgba(255, 204, 85, 0.8),
                    0 0 35px rgba(255, 204, 85, 0.6),
                    3px 3px 6px rgba(0, 0, 0, 0.9);
            }
        }

        /* 首页装饰卡片 */
        .home-card {
            max-width: 700px;
            background: rgba(30,30,30,0.6);
            border: 1px solid #444;
            border-radius: 12px;
            padding: 24px 32px;
            margin-top: 20px;
            backdrop-filter: blur(10px);
            text-align: center;
            line-height: 1.8;
            color: #ccc;
        }
        .home-card h3 {
            color: #ffcc55;
            margin-bottom: 12px;
            font-size: 18px;
        }
        .home-card p {
            font-size: 15px;
            color: #bbbbbb;
        }

        /* 时间统计 */
        .time-box {
            margin-top: 10px;
            font-size: 14px;
            color: #999;
        }
        .time-box span {
            color: #ffcc55;
            font-weight: bold;
        }

        /* 百科 */
        .content {
            display: none;
            align-items: center;
            background: #1a1a1a;
            padding: 14px 20px;
            border-radius: 8px;
            margin: 0 auto;
            max-width: 700px;
            border-left: 3px solid #ffcc55;
            position: relative;
            z-index: 5;
        }
        .content img {
            margin-right: 12px;
        }
        .content a {
            color: #eee;
            text-decoration: none;
        }

        /* 图片墙 */
        .photo-wall {
            display: none;
            background: #1a1a1a;
            padding: 24px;
            border-radius: 12px;
            border: 1px solid #333;
            position: relative;
            z-index: 5;
            max-width: 1000px;
            margin: 0 auto;
        }
        #photoContainer {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            padding: 10px 0;
        }
        .photo-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 10px;
        }
        .photo-item {
            position: relative;
            width: 170px;
            height: 210px;
            border: 7px solid #242424;
            background: #0d0d0d;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transform: rotate(calc(-3deg + Math.random()*6deg));
            transition: transform 0.25s, box-shadow 0.25s;
            cursor: pointer;
            overflow: hidden;
        }
        .photo-item:hover {
            transform: rotate(calc(-2deg + Math.random()*4deg)) scale(1.1);
            box-shadow: 0 8px 25px rgba(0,0,0,0.7);
        }
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block !important;
            opacity: 1 !important;
        }
        .replace-btn {
            margin-top: 10px;
            padding: 6px 12px;
            background: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        .replace-btn:hover {
            background: #333;
        }
        .add-btn {
            padding: 9px 18px;
            background: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .add-btn:hover {
            background: #333;
        }
        .pagination {
            margin-top: 24px;
            text-align: center;
        }
        .pagination button {
            padding: 7px 13px;
            margin: 0 5px;
            border: none;
            border-radius: 5px;
            background: #252525;
            color: #eee;
            cursor: pointer;
        }
        .pagination button.active {
            background: #ffcc55;
            color: #111;
        }
        #fileInput {
            display: none;
        }
        .preview-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.9);
            z-index: 9998; /* 比音乐播放器低 */
            justify-content: center;
            align-items: center;
        }
        .preview-img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        /* 新增：人物页面样式 */
        .character-page {
            display: none;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 5;
        }
        .character-header {
            text-align: center;
            margin-bottom: 30px;
            color: #ffcc55;
            font-size: 24px;
            text-shadow: 0 0 10px rgba(255,204,85,0.5);
        }
        /* 添加人物表单 */
        .add-character-form {
            background: rgba(30,30,30,0.7);
            border: 1px solid #444;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ffcc55;
            font-size: 15px;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            background: #2a2a2a;
            border: 1px solid #555;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 14px;
            resize: vertical;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #ffcc55;
            box-shadow: 0 0 8px rgba(255,204,85,0.3);
        }
        .add-char-btn {
            background: linear-gradient(120deg, #ffcc55, #ff9933);
            color: #121212;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .add-char-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(255,204,85,0.2);
        }
        /* 人物卡片列表 */
        .characters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }
        .character-card {
            background: rgba(30,30,30,0.7);
            border: 1px solid #444;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .character-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            border-color: #ffcc55;
        }
        .character-avatar {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 1px solid #444;
        }
        .character-info {
            padding: 18px;
        }
        .character-name {
            font-size: 18px;
            color: #ffcc55;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .character-desc {
            font-size: 14px;
            color: #bbbbbb;
            line-height: 1.6;
        }
        .no-characters {
            text-align: center;
            padding: 50px;
            color: #999;
            font-size: 16px;
        }

        /* 音乐悬浮播放器样式 - 修复被覆盖问题 */
        .music-player {
            position: fixed !important;
            bottom: 24px !important;
            right: 24px !important;
            width: 300px !important;
            height: 100px !important;
            background: linear-gradient(135deg, #1e1e1e, #2a2a2a) !important;
            border-radius: 18px !important;
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important;
            padding: 12px 18px !important;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4) !important;
            border: 1px solid #444 !important;
            z-index: 9999999 !important; /* 提升到更高层级，确保不被覆盖 */
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            pointer-events: auto !important; 
            visibility: visible !important; 
            opacity: 1 !important; 
            transform: none !important; 
            /* 新增：强制层级优先级 */
            position: fixed !important;
            float: right !important;
        }
        .music-top {
            display: flex;
            width: 100%;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .music-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .music-title {
            font-size: 14px;
            color: #fff;
            font-weight: 600; /* 修复原代码font-weight错误 */
        }
        .music-desc {
            font-size: 12px;
            color: #aaa;
        }
        .music-time {
            font-size: 11px;
            color: #888;
        }
        /* 进度条样式 */
        .progress-container {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        .progress-bar {
            height: 100%;
            background: #ffcc55;
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s linear;
        }
        /* 控制按钮区域 */
        .music-controls {
            display: flex;
            width: 100%;
            align-items: center;
            justify-content: space-between;
        }
        .play-pause-btns {
            display: flex;
            gap: 10px;
        }
        .volume-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .music-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #333;
            border: none;
            color: #fff;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .music-btn:hover {
            background: #ffcc55;
            color: #111;
            transform: scale(1.1);
        }
        /* 音量滑块样式 */
        .volume-slider {
            width: 60px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: #333;
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ffcc55;
            transition: all 0.2s;
        }
        .volume-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
    </style>
    <!-- 引入腾讯云COS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/cos-js-sdk-v5/dist/cos-js-sdk-v5.min.js"></script>
</head>
<body>

<!-- 星光背景 -->
<div class="stars" id="stars"></div>

<!-- 优化后的导航栏 -->
<div class="nav">
    <a onclick="showHome()" class="active" id="nav-home">首页</a>
    <a onclick="hideAll()" id="nav-events">大事件</a>
    <a onclick="showCharacters()" id="nav-characters">人物</a>
    <a onclick="showPhotoWall()" id="nav-photos">图片墙</a>
    <a onclick="showWiki()" id="nav-wiki">百科</a>
</div>

<!-- 首页内容区域 -->
<div class="home-container" id="homeContent">
    <h1 class="art-text">BlackForest血族——十年之约</h1>
    <h2 class="art-subtext">(2016—2026)</h2>

    <div class="home-card">
        <h3>🌑 关于 BlackForest 血族</h3>
        <p>
            名前BF缠绕您的宿命<br>
            建立于2016.8.6<br>
            记10年前创立的族群<br>
            这是属于我们成长的故事
        </p>
    </div>

    <div class="time-box">
        族群已陪伴我们 <span id="dayCount">0</span> 天
    </div>
</div>

<!-- 新增：人物页面 -->
<div class="character-page" id="characterPage">
    <h2 class="character-header">🗣️ BlackForest 血族人物录</h2>
    
    <!-- 添加人物表单 -->
    <div class="add-character-form">
        <div class="form-group">
            <label for="charName">人物姓名</label>
            <input type="text" id="charName" placeholder="请输入人物姓名">
        </div>
        <div class="form-group">
            <label for="charAvatar">上传头像（本地图片）</label>
            <input type="file" id="charAvatar" accept="image/*" style="color:#fff;">
        </div>
        <div class="form-group">
            <label for="charDesc">人物简介</label>
            <textarea id="charDesc" rows="4" placeholder="请输入人物的身份、故事、性格等简介内容"></textarea>
        </div>
        <button class="add-char-btn" onclick="addCharacter()">➕ 添加人物</button>
    </div>

    <!-- 人物卡片列表 -->
    <div class="characters-grid" id="charactersGrid"></div>
</div>

<!-- 百科模块 -->
<div class="content" id="wikiLink">
    <img src="./pic/blackforeast.jpg" alt="blackforest" width="50">
    <a href="https://blackforestbc.fandom.com/zh/wiki/%E9%BB%91%E6%A3%AE%E6%9E%97%E8%A1%80%E6%97%8F(yq)_Wiki">
        <h3>猫武士血族wiki</h3>
    </a>
</div>

<!-- 图片墙 -->
<div class="photo-wall" id="photoWall">
    <button class="add-btn" onclick="triggerAdd()">➕ 添加图片</button>
    <div id="photoContainer"></div>
    <div class="pagination" id="pagination"></div>
</div>

<!-- 图片预览 -->
<div class="preview-overlay" id="previewOverlay" onclick="closePreview()">
    <img src="" id="previewImg" class="preview-img">
</div>

<input type="file" id="fileInput" accept="image/*" multiple>

<!-- 音频标签 - 修复：添加闭合标签 -->
<audio id="bgMusic" loop preload="auto">
    <source src="./mp3/1.mp3" type="audio/mpeg">
</audio>

<!-- 音乐悬浮播放器 -->
<div class="music-player" id="musicPlayer">
    <div class="music-top">
        <div class="music-info">
            <div class="music-title">背景音乐</div>
            <div class="music-desc">自定义音频</div>
        </div>
        <div class="music-time" id="musicTime">00:00 / 00:00</div>
    </div>
    
    <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    
    <div class="music-controls">
        <div class="play-pause-btns">
            <button class="music-btn" id="playBtn">▶</button>
            <button class="music-btn" id="pauseBtn">⏸</button>
        </div>
        <div class="volume-controls">
            <button class="music-btn" id="muteBtn" title="静音">🔊</button>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="1">
        </div>
    </div>
</div>

<script>
    // ====================== 腾讯云COS配置 ======================
    const SECRET_ID = "AKIDeLp44oLejY9wVpukMlvrc9SXhcHitpWz";
    const SECRET_KEY = "FF1XqOktnTwBD2qVAlBPRJyPddR1Ndib";
    const BUCKET = "pic-1314828337";
    const REGION = "ap-guangzhou";

    // ====================== 共享图片链接 ======================
    const SHARED_PHOTOS = [
        "https://pic-1314828337.cos.ap-guangzhou.myqcloud.com/upload/1773575660384-1.jpg",
        "https://pic-1314828337.cos.ap-guangzhou.myqcloud.com/upload/1773575875419-2.jpg",
        "https://pic-1314828337.cos.ap-guangzhou.myqcloud.com/upload/1773575896731-3.jpg",
        "https://pic-1314828337.cos.ap-guangzhou.myqcloud.com/upload/1773575899896-4.jpg",
        "https://pic-1314828337.cos.ap-guangzhou.myqcloud.com/upload/1773575903870-5.jpg",
        "https://pic-1314828337.cos.ap-guangzhou.myqcloud.com/upload/1773575906924-6.jpg",
        "https://pic-1314828337.cos.ap-guangzhou.myqcloud.com/upload/1773575909760-7.jpg",
        "https://pic-1314828337.cos.ap-guangzhou.myqcloud.com/upload/1773575912547-8.jpg",
        "https://pic-1314828337.cos.ap-guangzhou.myqcloud.com/upload/1773575923126-9.jpg"
    ];

    // 初始化COS对象
    const cos = new COS({
        SecretId: SECRET_ID,
        SecretKey: SECRET_KEY
    });

    // ==================== 星光背景 ====================
    function createStars() {
        const stars = document.getElementById('stars');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            const size = Math.random() * 2 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            stars.appendChild(star);
        }
    }

    // ==================== 天数计算 ====================
    function calcDays() {
        const start = new Date('2016-08-06');
        const now = new Date();
        const diff = Math.floor((now - start) / (1000 * 60 * 60 * 24));
        document.getElementById('dayCount').innerText = diff;
    }

    // ==================== 音乐播放器逻辑 ====================
    const audio = document.getElementById('bgMusic');
    const playBtn = document.getElementById('playBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const muteBtn = document.getElementById('muteBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const musicTime = document.getElementById('musicTime');
    const musicPlayer = document.getElementById('musicPlayer');
    let hasInteracted = false;
    let isMuted = false;
    let originalVolume = 1;

    // 修复：强制保持音乐播放器可见，优化定时器逻辑
    function keepPlayerVisible() {
        musicPlayer.style.display = 'flex';
        musicPlayer.style.visibility = 'visible';
        musicPlayer.style.opacity = '1';
        musicPlayer.style.zIndex = '9999999'; // 强制重置z-index
    }
    setInterval(keepPlayerVisible, 500); // 缩短检测间隔
    keepPlayerVisible(); // 初始化立即执行

    // 格式化时间
    function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    // 更新进度条
    function updateProgress() {
        if (audio.duration) {
            const progressPercent = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = `${progressPercent}%`;
            musicTime.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
        }
    }

    // 解决自动播放限制
    document.addEventListener('click', () => {
        hasInteracted = true;
        audio.load();
    }, { once: true });

    // 播放/暂停/静音/音量控制
    playBtn.onclick = () => {
        if (!hasInteracted) {
            alert('请先点击页面任意位置，再播放音乐！');
            return;
        }
        audio.play().catch(err => {
            console.error('播放失败:', err);
            alert('播放失败，请检查：\n1. mp3/1.mp3 文件是否存在\n2. 是否使用本地服务器（如Live Server）打开页面');
        });
    };

    pauseBtn.onclick = () => audio.pause();

    muteBtn.onclick = () => {
        isMuted = !isMuted;
        if (isMuted) {
            originalVolume = audio.volume;
            audio.volume = 0;
            volumeSlider.value = 0;
            muteBtn.innerHTML = '🔇';
            muteBtn.title = '取消静音';
        } else {
            audio.volume = originalVolume;
            volumeSlider.value = originalVolume;
            muteBtn.innerHTML = '🔊';
            muteBtn.title = '静音';
        }
    };

    volumeSlider.addEventListener('input', () => {
        audio.volume = volumeSlider.value;
        if (volumeSlider.value == 0) {
            isMuted = true;
            muteBtn.innerHTML = '🔇';
            muteBtn.title = '取消静音';
        } else {
            isMuted = false;
            muteBtn.innerHTML = '🔊';
            muteBtn.title = '静音';
            originalVolume = volumeSlider.value;
        }
    });

    // 进度条点击跳转
    progressContainer.addEventListener('click', (e) => {
        const progressWidth = progressContainer.clientWidth;
        const clickX = e.offsetX;
        audio.currentTime = (clickX / progressWidth) * audio.duration;
    });

    audio.addEventListener('timeupdate', updateProgress);
    audio.addEventListener('loadedmetadata', updateProgress);
    audio.volume = volumeSlider.value;

    // ==================== 页面切换逻辑 ====================
    // 重置导航栏激活态
    function resetNavActive() {
        document.querySelectorAll('.nav a').forEach(link => link.classList.remove('active'));
    }

    // 隐藏所有内容模块
    function hideAll() {
        homeContent.style.display = 'none';
        document.getElementById('wikiLink').style.display = 'none';
        document.getElementById('photoWall').style.display = 'none';
        document.getElementById('characterPage').style.display = 'none';
        resetNavActive();
        keepPlayerVisible(); // 切换页面时强制显示播放器
    }

    // 显示首页
    function showHome() {
        hideAll();
        homeContent.style.display = 'flex';
        document.getElementById('nav-home').classList.add('active');
        calcDays();
    }

    // 显示百科
    function showWiki() {
        hideAll();
        document.getElementById('wikiLink').style.display = 'flex';
        document.getElementById('nav-wiki').classList.add('active');
    }

    // 显示图片墙
    function showPhotoWall() {
        hideAll();
        document.getElementById('photoWall').style.display = 'block';
        document.getElementById('nav-photos').classList.add('active');
        render();
    }

    // ==================== 人物云存储功能 ====================
    const CHARACTER_FOLDER = "cat/";
    const CHARACTER_DATA_PATH = "data/characters.json";

    // 从COS读取人物
    function loadCharactersFromCOS(callback) {
      cos.getObject({
        Bucket: BUCKET,
        Region: REGION,
        Key: CHARACTER_DATA_PATH
      }, function(err, data) {
        if (err) {
          callback([]);
        } else {
          try {
            callback(JSON.parse(data.Body));
          } catch (e) {
            callback([]);
          }
        }
      });
    }

    // 保存人物到COS
    function saveCharactersToCOS(characters, callback) {
      cos.putObject({
        Bucket: BUCKET,
        Region: REGION,
        Key: CHARACTER_DATA_PATH,
        Body: JSON.stringify(characters, null, 2),
        ContentType: "application/json"
      }, callback);
    }

    // 上传头像到 cat/
    function uploadCharacterAvatar(file, callback) {
      const ext = file.name.split('.').pop();
      const fileName = CHARACTER_FOLDER + Date.now() + "-" + Math.random().toString(36).substr(2,6) + "." + ext;
      cos.putObject({
        Bucket: BUCKET,
        Region: REGION,
        Key: fileName,
        Body: file
      }, function(err, data) {
        if (err) {
          alert("头像上传失败：" + (err.Message || ''));
          return;
        }
        const avatarUrl = `https://${BUCKET}.cos.${REGION}.myqcloud.com/${fileName}`;
        callback(avatarUrl);
      });
    }

    // 渲染人物列表
    function renderCharacters() {
      const grid = document.getElementById("charactersGrid");
      grid.innerHTML = "加载中...";
      loadCharactersFromCOS(function(characters) {
        grid.innerHTML = "";
        if (!characters || characters.length === 0) {
          grid.innerHTML = "<div class='no-characters'>暂无人物数据，点击上方表单添加第一个人物吧～</div>";
          return;
        }
        characters.forEach(char => {
          const card = document.createElement("div");
          card.className = "character-card";
          card.innerHTML = `
            <img src="${char.avatar}" alt="${char.name}" class="character-avatar" 
                 onerror="this.src='https://picsum.photos/300/200?random=${char.id}'">
            <div class="character-info">
              <div class="character-name">${char.name}</div>
              <div class="character-desc">${char.desc}</div>
              <div style="margin-top:10px;">
                <button onclick="deleteCharacter(${char.id});event.stopPropagation();" 
                        style="background:#c44545;color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;">
                  删除人物
                </button>
              </div>
            </div>
          `;
          grid.appendChild(card);
        });
      });
    }

    // 添加人物（上传头像+保存到云端）
    function addCharacter() {
      const name = document.getElementById("charName").value.trim();
      const desc = document.getElementById("charDesc").value.trim();
      const file = document.getElementById("charAvatar").files[0];

      if (!name) { alert("请输入姓名！"); return; }
      if (!desc) { alert("请输入简介！"); return; }
      if (!file) { alert("请选择头像图片！"); return; }

      uploadCharacterAvatar(file, function(avatarUrl) {
        loadCharactersFromCOS(function(characters) {
          characters.push({
            id: Date.now(),
            name: name,
            avatar: avatarUrl,
            desc: desc
          });
          saveCharactersToCOS(characters, function(err) {
            if (err) {
              alert("保存失败：" + err.Message);
            } else {
              alert("添加成功！所有人都能看到！");
              document.getElementById("charName").value = "";
              document.getElementById("charAvatar").value = "";
              document.getElementById("charDesc").value = "";
              renderCharacters();
            }
          });
        });
      });
    }

    // 删除人物
    function deleteCharacter(characterId) {
      if (!confirm("确定删除该人物？删除后所有人都看不见！")) return;
      loadCharactersFromCOS(function(chars) {
        const newChars = chars.filter(c => c.id !== characterId);
        saveCharactersToCOS(newChars, function(err) {
          if (err) {
            alert("删除失败");
          } else {
            alert("删除成功");
            renderCharacters();
          }
        });
      });
    }

    // 显示人物页
    function showCharacters() {
        hideAll();
        document.getElementById("characterPage").style.display = "block";
        document.getElementById("nav-characters").classList.add("active");
        renderCharacters();
    }

    // ==================== 图片墙逻辑 ====================
    const MAX_IMAGES = 100;
    const PER_PAGE = 30;
    let photos = [];
    let currentPage = 1;
    let replaceIndex = null;

    const photoContainer = document.getElementById('photoContainer');
    const pagination = document.getElementById('pagination');
    const fileInput = document.getElementById('fileInput');
    const previewOverlay = document.getElementById('previewOverlay');
    const previewImg = document.getElementById('previewImg');
    const homeContent = document.getElementById('homeContent');

    // 初始化图片数据
    function initPhotos() {
        photos = [...SHARED_PHOTOS];
        const saved = localStorage.getItem('savedPhotos');
        if (saved) {
            const localPhotos = JSON.parse(saved);
            const newPhotos = localPhotos.filter(img => !SHARED_PHOTOS.includes(img));
            photos = [...photos, ...newPhotos];
        }
        save();
        render();
    }

    // 保存图片数据
    function save() {
        localStorage.setItem('savedPhotos', JSON.stringify(photos));
    }

    // ==================== 图片墙操作 ====================
    function uploadToCOS(file, callback) {
        const fileName = "upload/" + Date.now() + "-" + file.name.replace(/[^a-zA-Z0-9_\.]/g, "");
        
        cos.putObject({
            Bucket: BUCKET,
            Region: REGION,
            Key: fileName,
            Body: file,
            onProgress: (progress) => {
                console.log("上传进度：", (progress.percent * 100).toFixed(1) + "%");
            }
        }, (err, data) => {
            if (err) {
                alert("上传失败：" + (err.message || 'CORS blocked or network error'));
                return;
            }
            const imgUrl = `https://${BUCKET}.cos.${REGION}.myqcloud.com/${fileName}`;
            callback(imgUrl);
        });
    }

    function triggerAdd() {
        if (photos.length >= MAX_IMAGES) {
            alert('最多 100 张');
            return;
        }
        fileInput.onchange = null;
        fileInput.onchange = function (e) {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                if (photos.length >= MAX_IMAGES) return;
                uploadToCOS(file, (imgUrl) => {
                    photos.push(imgUrl);
                    save();
                    setTimeout(() => render(), 50);
                    alert("图片上传成功！别人现在能看到啦～");
                });
            });
            e.target.value = '';
        };
        fileInput.click();
    }

    function openPreview(src) {
        previewImg.src = src;
        previewOverlay.style.display = "flex";
        keepPlayerVisible(); // 预览图片时强制显示播放器
    }

    function closePreview() {
        previewOverlay.style.display = "none";
    }

    function startReplace(index) {
        replaceIndex = index;
        fileInput.onchange = null;
        fileInput.onchange = function (e) {
            const f = e.target.files[0];
            if (!f) return;
            uploadToCOS(f, (imgUrl) => {
                photos[replaceIndex] = imgUrl;
                save();
                setTimeout(() => render(), 50);
                alert("图片替换成功！");
            });
            e.target.value = '';
        };
        fileInput.click();
    }

    function render() {
        const totalPages = Math.ceil(photos.length / PER_PAGE);
        const start = (currentPage - 1) * PER_PAGE;
        const pageData = photos.slice(start, start + PER_PAGE);

        photoContainer.innerHTML = '';

        if (photos.length === 0) {
            photoContainer.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 50px; color: #999;">暂无图片</div>';
            pagination.innerHTML = '';
            return;
        }

        pageData.forEach((src, i) => {
            const idx = start + i;
            const card = document.createElement('div');
            card.className = 'photo-card';
            
            const div = document.createElement('div');
            div.className = 'photo-item';
            
            const img = document.createElement('img');
            img.src = src;
            img.alt = `photo-${idx}`;
            img.style.display = 'block';
            img.style.width = '100%';
            img.style.height = '100%';
            img.style.objectFit = 'cover';
            
            div.appendChild(img);
            div.onclick = () => openPreview(src);
            div.oncontextmenu = e => {
                e.preventDefault();
                if (confirm('确定删除这张图片？')) {
                    photos.splice(idx, 1);
                    save();
                    render();
                }
            };

            const btn = document.createElement('button');
            btn.className = 'replace-btn';
            btn.innerText = '替换';
            btn.onclick = () => startReplace(idx);

            card.appendChild(div);
            card.appendChild(btn);
            photoContainer.appendChild(card);
        });

        pagination.innerHTML = '';
        for (let p = 1; p <= totalPages; p++) {
            const btn = document.createElement('button');
            btn.textContent = p;
            if (p === currentPage) btn.classList.add('active');
            btn.onclick = () => {
                currentPage = p;
                render();
            };
            pagination.appendChild(btn);
        }
    }

    // ==================== 初始化 ====================
    createStars();
    calcDays();
    initPhotos();
    showHome();
    setInterval(calcDays, 86400000);
</script>
</body>
</html>
