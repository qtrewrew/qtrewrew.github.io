<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blackforest</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            overflow: visible !important;
            position: static !important;
            transform: none !important;
        }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 120px;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #121212 60%);
            z-index: -2;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        .star {
            position: absolute;
            background: rgba(255, 204, 85, 0.4);
            border-radius: 50%;
            animation: twinkle 3s infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.2; }
            100% { opacity: 1; }
        }

        .nav {
            max-width: 800px;
            margin: 0 auto 30px;
            background: rgba(30,30,30,0.85);
            padding: 12px 20px;
            border-radius: 16px;
            display: flex;
            gap: 8px;
            border: 1px solid #444;
            position: relative;
            z-index: 10;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .nav a {
            color: #e0e0e0;
            text-decoration: none;
            font-size: 16px;
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 12px;
            position: relative;
            transition: all 0.3s ease;
            overflow: hidden;
        }
        .nav a::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,204,85,0.1), transparent);
            transition: left 0.6s ease;
        }
        .nav a:hover {
            color: #ffcc55;
            background: rgba(50,50,50,0.5);
            transform: translateY(-2px);
        }
        .nav a:hover::before {
            left: 100%;
        }
        .nav a.active {
            background: rgba(255,204,85,0.2);
            color: #ffcc55;
            border: 1px solid rgba(255,204,85,0.3);
        }

        .home-container {
            display: flex;
            min-height: 60vh;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
            gap: 20px;
            position: relative;
            z-index: 5;
        }
        .art-text {
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: bold;
            color: #ffcc55;
            text-shadow: 
                0 0 10px rgba(255, 204, 85, 0.8),
                0 0 20px rgba(255, 204, 85, 0.6),
                0 0 30px rgba(255, 204, 85, 0.4),
                2px 2px 4px rgba(0, 0, 0, 0.8);
            font-family: "STKaiti", "KaiTi", serif;
            letter-spacing: 0.1em;
            transform: none;
            background: linear-gradient(120deg, #ffcc55, #ff9933, #ffcc55);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: glow 3s ease-in-out infinite alternate;
        }
        .art-subtext {
            font-size: clamp(1rem, 2.5vw, 2rem);
            font-weight: bold;
            color: #ffcc55;
            text-shadow: 
                0 0 8px rgba(255, 204, 85, 0.8),
                0 0 15px rgba(255, 204, 85, 0.6),
                0 0 25px rgba(255, 204, 85, 0.4),
                1px 1px 3px rgba(0, 0, 0, 0.8);
            font-family: "STKaiti", "KaiTi", serif;
            letter-spacing: 0.2em;
            transform: none;
            background: linear-gradient(120deg, #ffcc55, #ff9933, #ffcc55);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: glow 3s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from {
                text-shadow: 
                    0 0 10px rgba(255, 204, 85, 0.8),
                    0 0 20px rgba(255, 204, 85, 0.6),
                    0 0 30px rgba(255, 204, 85, 0.4),
                    2px 2px 4px rgba(0, 0, 0, 0.8);
            }
            to {
                text-shadow: 
                    0 0 15px rgba(255, 204, 85, 1),
                    0 0 25px rgba(255, 204, 85, 0.8),
                    0 0 35px rgba(255, 204, 85, 0.6),
                    3px 3px 6px rgba(0, 0, 0, 0.9);
            }
        }

        .home-card {
            max-width: 700px;
            background: rgba(30,30,30,0.6);
            border: 1px solid #444;
            border-radius: 12px;
            padding: 24px 32px;
            margin-top: 20px;
            backdrop-filter: blur(10px);
            text-align: center;
            line-height: 1.8;
            color: #ccc;
        }
        .home-card h3 {
            color: #ffcc55;
            margin-bottom: 12px;
            font-size: 18px;
        }
        .home-card p {
            font-size: 15px;
            color: #bbbbbb;
        }

        .time-box {
            margin-top: 10px;
            font-size: 14px;
            color: #999;
        }
        .time-box span {
            color: #ffcc55;
            font-weight: bold;
        }

        .content {
            display: none;
            align-items: center;
            background: #1a1a1a;
            padding: 14px 20px;
            border-radius: 8px;
            margin: 0 auto;
            max-width: 700px;
            border-left: 3px solid #ffcc55;
            position: relative;
            z-index: 5;
        }
        .content img {
            margin-right: 12px;
        }
        .content a {
            color: #eee;
            text-decoration: none;
        }

        .photo-wall {
            display: none;
            background: #1a1a1a;
            padding: 24px;
            border-radius: 12px;
            border: 1px solid #333;
            position: relative;
            z-index: 5;
            max-width: 1000px;
            margin: 0 auto;
        }
        #photoContainer {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            padding: 10px 0;
        }
        .photo-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 10px;
        }
        .photo-item {
            position: relative;
            width: 170px;
            height: 210px;
            border: 7px solid #242424;
            background: #0d0d0d;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transform: rotate(calc(-3deg + Math.random()*6deg));
            transition: transform 0.25s, box-shadow 0.25s;
            cursor: pointer;
            overflow: hidden;
        }
        .photo-item:hover {
            transform: rotate(calc(-2deg + Math.random()*4deg)) scale(1.1);
            box-shadow: 0 8px 25px rgba(0,0,0,0.7);
        }
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block !important;
            opacity: 1 !important;
        }
        .replace-btn {
            margin-top: 10px;
            padding: 6px 12px;
            background: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        .replace-btn:hover {
            background: #333;
        }
        .add-btn {
            padding: 9px 18px;
            background: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .add-btn:hover {
            background: #333;
        }
        .pagination {
            margin-top: 24px;
            text-align: center;
        }
        .pagination button {
            padding: 7px 13px;
            margin: 0 5px;
            border: none;
            border-radius: 5px;
            background: #252525;
            color: #eee;
            cursor: pointer;
        }
        .pagination button.active {
            background: #ffcc55;
            color: #111;
        }
        #fileInput {
            display: none;
        }
        .preview-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.9);
            z-index: 9998;
            justify-content: center;
            align-items: center;
        }
        .preview-img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .character-page {
            display: none;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 5;
        }
        .character-header {
            text-align: center;
            margin-bottom: 30px;
            color: #ffcc55;
            font-size: 24px;
            text-shadow: 0 0 10px rgba(255,204,85,0.5);
        }
        .add-character-form {
            background: rgba(30,30,30,0.7);
            border: 1px solid #444;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ffcc55;
            font-size: 15px;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            background: #2a2a2a;
            border: 1px solid #555;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 14px;
            resize: vertical;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #ffcc55;
            box-shadow: 0 0 8px rgba(255,204,85,0.3);
        }
        .add-char-btn {
            background: linear-gradient(120deg, #ffcc55, #ff9933);
            color: #121212;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .add-char-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(255,204,85,0.2);
        }
        .cancel-edit-btn {
            background: #444;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-left: 10px;
        }
        .cancel-edit-btn:hover {
            background: #555;
            transform: translateY(-2px);
        }
        .characters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }
        .character-card {
            background: rgba(30,30,30,0.7);
            border: 1px solid #444;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .character-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            border-color: #ffcc55;
        }
        .character-avatar {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 1px solid #444;
        }
        .character-info {
            padding: 18px;
            text-align: center;
        }
        .character-name {
            font-size: 18px;
            color: #ffcc55;
            margin-bottom: 10px;
            font-weight: bold;
            position: relative;
        }
        .character-desc {
            font-size: 14px;
            color: #e0e0e0;
            line-height: 2;
            margin: 15px 0;
            padding: 15px 20px;
            background: linear-gradient(135deg, rgba(25,25,25,0.8), rgba(15,15,15,0.8));
            border-radius: 8px;
            border-left: 3px solid #ffcc55;
            text-align: left;
            white-space: pre-line;
        }
        .character-desc span.field {
            color: #ffcc55;
            font-weight: 600;
        }
        /* 新增编辑输入框样式 */
        .edit-input, .edit-textarea {
            width: 100%;
            padding: 8px 12px;
            background: #2a2a2a;
            border: 1px solid #ffcc55;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .edit-textarea {
            min-height: 120px;
            resize: vertical;
            line-height: 1.8;
        }
        .edit-avatar-btn {
            background: #3a6ea5;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 12px;
            cursor: pointer;
            margin: 5px 0;
        }
        .edit-avatar-btn:hover {
            background: #4a7ebf;
        }
        .save-edit-btn {
            background: #28a745;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 12px;
            cursor: pointer;
            margin: 0 4px;
        }
        .save-edit-btn:hover {
            background: #218838;
        }
        .cancel-edit-btn-sm {
            background: #dc3545;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 12px;
            cursor: pointer;
            margin: 0 4px;
        }
        .cancel-edit-btn-sm:hover {
            background: #c82333;
        }
        .no-characters {
            text-align: center;
            padding: 50px;
            color: #999;
            font-size: 16px;
        }

        .music-player {
            position: fixed !important;
            bottom: 24px !important;
            right: 24px !important;
            width: 300px !important;
            height: 100px !important;
            background: linear-gradient(135deg, #1e1e1e, #2a2a2a) !important;
            border-radius: 18px !important;
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important;
            padding: 12px 18px !important;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4) !important;
            border: 1px solid #444 !important;
            z-index: 9999999 !important;
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            pointer-events: auto !important; 
            visibility: visible !important; 
            opacity: 1 !important; 
            transform: none !important; 
        }
        .music-top {
            display: flex;
            width: 100%;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .music-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .music-title {
            font-size: 14px;
            color: #fff;
            font-weight: 600;
        }
        .music-desc {
            font-size: 12px;
            color: #aaa;
        }
        .music-time {
            font-size: 11px;
            color: #888;
        }
        .progress-container {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        .progress-bar {
            height: 100%;
            background: #ffcc55;
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s linear;
        }
        .music-controls {
            display: flex;
            width: 100%;
            align-items: center;
            justify-content: space-between;
        }
        .play-pause-btns {
            display: flex;
            gap: 10px;
        }
        .volume-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .music-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #333;
            border: none;
            color: #fff;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .music-btn:hover {
            background: #ffcc55;
            color: #111;
            transform: scale(1.1);
        }
        .volume-slider {
            width: 60px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: #333;
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ffcc55;
            transition: all 0.2s;
        }
        .volume-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
        /* ====================== 大事件时间轴 ====================== */
.events-page {
  display: none;
  max-width: 800px;
  margin: 0 auto;
  padding: 20px;
  position: relative;
  z-index: 5;
}
.events-header {
  text-align: center;
  margin-bottom: 30px;
  color: #ffcc55;
  font-size: 24px;
  text-shadow: 0 0 10px rgba(255,204,85,0.5);
}
.add-event-form {
  background: rgba(30,30,30,0.7);
  border: 1px solid #444;
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 40px;
  backdrop-filter: blur(10px);
}
.timeline {
  position: relative;
  padding-left: 40px;
}
.timeline::before {
  content: '';
  position: absolute;
  left: 10px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: #ffcc55;
}
.timeline-item {
  position: relative;
  background: rgba(30,30,30,0.6);
  border: 1px solid #444;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 24px;
  backdrop-filter: blur(10px);
}
.timeline-item::before {
  content: '';
  position: absolute;
  left: -38px;
  top: 24px;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #ffcc55;
  border: 3px solid #121212;
  z-index: 2;
}
.timeline-date {
  font-size: 14px;
  color: #ffcc55;
  font-weight: bold;
  margin-bottom: 8px;
}
.timeline-title {
  font-size: 18px;
  color: #fff;
  margin-bottom: 10px;
}
.timeline-content {
  color: #ccc;
  line-height: 1.7;
  white-space: pre-line;
}
.timeline-img {
  max-width: 100%;
  border-radius: 8px;
  margin: 10px 0;
  cursor: pointer;
}
.timeline-btns {
  margin-top: 12px;
  display: flex;
  gap: 8px;
}
.timeline-btns button {
  padding: 5px 10px;
  border: none;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
}
.btn-edit { background: #3a6ea5; color: #fff; }
.btn-del { background: #dc3545; color: #fff; }
.no-events {
  text-align: center;
  padding: 40px;
  color: #999;
}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/cos-js-sdk-v5/dist/cos-js-sdk-v5.min.js"></script>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="nav">
    <a onclick="showHome()" class="active" id="nav-home">首页</a>
    <a onclick="showEvents()" id="nav-events">大事件</a>
    <a onclick="showCharacters()" id="nav-characters">人物</a>
    <a onclick="showPhotoWall()" id="nav-photos">图片墙</a>
    <a onclick="showWiki()" id="nav-wiki">百科</a>
</div>

<div class="home-container" id="homeContent">
    <h1 class="art-text">BlackForest血族——十年之约</h1>
    <h2 class="art-subtext">(2016—2026)</h2>

    <div class="home-card">
        <h3>🌑 关于 BlackForest 血族</h3>
        <p>
            名前BF缠绕您的宿命<br>
            建立于2016.8.6<br>
            记10年前创立的族群<br>
            这是属于我们成长的故事
        </p>
    </div>

    <div class="time-box">
        族群已陪伴我们 <span id="dayCount">0</span> 天
    </div>
</div>

<div class="character-page" id="characterPage">
    <h2 class="character-header">🗣️ BlackForest 血族人物录</h2>
    
    <div class="add-character-form">
        <div class="form-group">
            <label for="charName">人物姓名</label>
            <input type="text" id="charName" placeholder="请输入人物姓名">
        </div>
        <div class="form-group">
            <label for="charAvatar">上传头像（本地图片）</label>
            <input type="file" id="charAvatar" accept="image/*" style="color:#fff;">
        </div>
        <div class="form-group">
            <label for="charDesc">人物简介</label>
            <textarea id="charDesc" rows="4" placeholder="请按以下格式填写（每行一个字段）：
名字：银星
当前职务：组长
加入时间：2018.5.1
性格：沉稳、负责
备注：核心成员之一"></textarea>
        </div>
        <button class="add-char-btn" onclick="handleCharacterBtn()">➕ 添加人物</button>
        <button class="cancel-edit-btn" onclick="clearForm()">取消编辑</button>
    </div>

    <div class="characters-grid" id="charactersGrid"></div>
</div>
<!-- ====================== 大事件时间轴 ====================== -->
<div class="events-page" id="eventsPage">
  <h2 class="events-header">📅 BlackForest 大事件记录</h2>

  <div class="add-event-form">
    <div class="form-group">
      <label>事件日期</label>
      <input type="text" id="eventDate" placeholder="例如：2016.8.6 创立族群">
    </div>
    <div class="form-group">
      <label>事件标题</label>
      <input type="text" id="eventTitle" placeholder="简短标题">
    </div>
    <div class="form-group">
      <label>上传图片（可选）</label>
      <input type="file" id="eventImg" accept="image/*" style="color:#fff;">
    </div>
    <div class="form-group">
      <label>事件详情</label>
      <textarea id="eventContent" rows="4" placeholder="描述这件事"></textarea>
    </div>
    <button class="add-char-btn" onclick="addEvent()">➕ 添加事件</button>
    <button class="cancel-edit-btn" onclick="clearEventForm()">清空</button>
  </div>

  <div class="timeline" id="timeline"></div>
</div>
<!-- 新增：头像上传隐藏输入框 -->

<script>
    // 腾讯云COS配置
    const SECRET_ID = "AKIDeLp44oLejY9wVpukMlvrc9SXhcHitpWz";
    const SECRET_KEY = "FF1XqOktnTwBD2qVAlBPRJyPddR1Ndib";
    const BUCKET = "pic-1314828337";
    const REGION = "ap-guangzhou";

    // 初始图片列表
    const SHARED_PHOTOS = [
        "https://pic-1314828337.cos.ap-guangzhou.myqcloud.com/upload/1773575660384-1.jpg",
        "https://pic-1314828337.cos.ap-guangzhou.myqcloud.com/upload/1773575875419-2.jpg",
        "https://pic-1314828337.cos.ap-guangzhou.myqcloud.com/upload/1773575896731-3.jpg",
        "https://pic-1314828337.cos.ap-guangzhou.myqcloud.com/upload/1773575899896-4.jpg",
        "https://pic-1314828337.cos.ap-guangzhou.myqcloud.com/upload/1773575903870-5.jpg",
        "https://pic-1314828337.cos.ap-guangzhou.myqcloud.com/upload/1773575906924-6.jpg",
        "https://pic-1314828337.cos.ap-guangzhou.myqcloud.com/upload/1773575909760-7.jpg",
        "https://pic-1314828337.cos.ap-guangzhou.myqcloud.com/upload/1773575912547-8.jpg",
        "https://pic-1314828337.cos.ap-guangzhou.myqcloud.com/upload/1773575923126-9.jpg"
    ];

    // 初始化COS实例
    const cos = new COS({
        SecretId: SECRET_ID,
        SecretKey: SECRET_KEY
    });

    // 全局变量：当前编辑的人物ID和临时头像文件
    let editingCharId = null;
    let tempAvatarFile = null;

    // ====================== 通用功能 ======================
    // 创建星空背景
    function createStars() {
        const stars = document.getElementById('stars');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            const size = Math.random() * 2 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            stars.appendChild(star);
        }
    }

    // 计算天数
    function calcDays() {
        const start = new Date('2016-08-06');
        const now = new Date();
        const diff = Math.floor((now - start) / (1000 * 60 * 60 * 24));
        document.getElementById('dayCount').innerText = diff;
    }

    // ====================== 音乐播放器 ======================
    const audio = document.getElementById('bgMusic');
    const playBtn = document.getElementById('playBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const muteBtn = document.getElementById('muteBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const musicTime = document.getElementById('musicTime');
    const musicPlayer = document.getElementById('musicPlayer');
    let hasInteracted = false;
    let isMuted = false;
    let originalVolume = 1;

    // 强制保持音乐播放器可见
    function keepPlayerVisible() {
        musicPlayer.style.display = 'flex';
        musicPlayer.style.visibility = 'visible';
        musicPlayer.style.opacity = '1';
        musicPlayer.style.zIndex = '9999999';
    }
    setInterval(keepPlayerVisible, 100);
    keepPlayerVisible();

    // 格式化时间
    function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    // 更新播放进度
    function updateProgress() {
        if (audio.duration) {
            const progressPercent = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = `${progressPercent}%`;
            musicTime.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
        }
    }

    // 页面交互后加载音频
    document.addEventListener('click', () => {
        hasInteracted = true;
        audio.load();
    }, { once: true });

    // 播放按钮
    playBtn.onclick = () => {
        if (!hasInteracted) {
            alert('请先点击页面任意位置，再播放音乐！');
            return;
        }
        audio.play().catch(err => {
            console.error('播放失败:', err);
            alert('播放失败，请检查：\n1. mp3/1.mp3 文件是否存在\n2. 是否使用本地服务器（如Live Server）打开页面');
        });
    };

    // 暂停按钮
    pauseBtn.onclick = () => audio.pause();

    // 静音按钮
    muteBtn.onclick = () => {
        isMuted = !isMuted;
        if (isMuted) {
            originalVolume = audio.volume;
            audio.volume = 0;
            volumeSlider.value = 0;
            muteBtn.innerHTML = '🔇';
            muteBtn.title = '取消静音';
        } else {
            audio.volume = originalVolume;
            volumeSlider.value = originalVolume;
            muteBtn.innerHTML = '🔊';
            muteBtn.title = '静音';
        }
    };

    // 音量调节
    volumeSlider.addEventListener('input', () => {
        audio.volume = volumeSlider.value;
        if (volumeSlider.value == 0) {
            isMuted = true;
            muteBtn.innerHTML = '🔇';
            muteBtn.title = '取消静音';
        } else {
            isMuted = false;
            muteBtn.innerHTML = '🔊';
            muteBtn.title = '静音';
            originalVolume = volumeSlider.value;
        }
    });

    // 进度条点击跳转
    progressContainer.addEventListener('click', (e) => {
        const progressWidth = progressContainer.clientWidth;
        const clickX = e.offsetX;
        audio.currentTime = (clickX / progressWidth) * audio.duration;
    });

    // 监听音频进度更新
    audio.addEventListener('timeupdate', updateProgress);
    audio.addEventListener('loadedmetadata', updateProgress);
    audio.volume = volumeSlider.value;

    // ====================== 导航切换 ======================
    function resetNavActive() {
        document.querySelectorAll('.nav a').forEach(link => link.classList.remove('active'));
    }

    function hideAll() {
        homeContent.style.display = 'none';
        document.getElementById('wikiLink').style.display = 'none';
        document.getElementById('photoWall').style.display = 'none';
        document.getElementById('characterPage').style.display = 'none';
        document.getElementById('eventsPage').style.display = 'none'; // 新增大事件页面隐藏
        resetNavActive();
        keepPlayerVisible();
    }

    function showHome() {
        hideAll();
        homeContent.style.display = 'flex';
        document.getElementById('nav-home').classList.add('active');
        calcDays();
    }

    function showWiki() {
        hideAll();
        document.getElementById('wikiLink').style.display = 'flex';
        document.getElementById('nav-wiki').classList.add('active');
    }

    function showPhotoWall() {
        hideAll();
        document.getElementById('photoWall').style.display = 'block';
        document.getElementById('nav-photos').classList.add('active');
        render();
    }

    // ====================== 人物管理（核心） ======================
    const CHARACTER_FOLDER = "cat/";
    const CHARACTER_DATA_PATH = "data/characters.json";

    // 从COS加载人物数据
    function loadCharactersFromCOS(callback) {
      cos.getObject({
        Bucket: BUCKET,
        Region: REGION,
        Key: CHARACTER_DATA_PATH
      }, function(err, data) {
        if (err) {
          callback([]);
        } else {
          try {
            callback(JSON.parse(data.Body));
          } catch (e) {
            callback([]);
          }
        }
      });
    }

    // 保存人物数据到COS
    function saveCharactersToCOS(characters, callback) {
      cos.putObject({
        Bucket: BUCKET,
        Region: REGION,
        Key: CHARACTER_DATA_PATH,
        Body: JSON.stringify(characters, null, 2),
        ContentType: "application/json"
      }, callback);
    }

    // 上传人物头像到COS
    function uploadCharacterAvatar(file, callback) {
      const ext = file.name.split('.').pop();
      const fileName = CHARACTER_FOLDER + Date.now() + "-" + Math.random().toString(36).substr(2,6) + "." + ext;
      cos.putObject({
        Bucket: BUCKET,
        Region: REGION,
        Key: fileName,
        Body: file
      }, function(err, data) {
        if (err) {
          alert("头像上传失败：" + (err.Message || ''));
          return;
        }
        const avatarUrl = `https://${BUCKET}.cos.${REGION}.myqcloud.com/${fileName}`;
        callback(avatarUrl);
      });
    }

    // 格式化简介内容（高亮字段名）
    function formatCharacterDesc(desc) {
        if (!desc) return '';
        const lines = desc.split('\n').filter(line => line.trim() !== '');
        return lines.map(line => {
            const colonIndex = line.indexOf('：');
            if (colonIndex > 0) {
                const field = line.substring(0, colonIndex + 1);
                const value = line.substring(colonIndex + 1);
                return `<span class="field">${field}</span>${value}`;
            }
            return line;
        }).join('<br>');
    }

    // 进入编辑模式（核心修改）
    // 进入编辑模式（修复版）
  function enterEditMode(charId) {
  editingCharId = charId;
  tempAvatarFile = null;

  loadCharactersFromCOS(function (chars) {
    const char = chars.find(c => c.id === charId);
    if (!char) return;

    const card = document.querySelector(`[data-char-id="${charId}"]`);
    if (!card) return;

    const infoArea = card.querySelector('.character-info');

    const editHtml = `
      <input type="text" class="edit-input" id="editName_${charId}" value="${char.name}" placeholder="人物姓名">
      <button class="edit-avatar-btn" onclick="selectNewAvatar(${charId})">更换头像</button>
      <textarea class="edit-textarea" id="editDesc_${charId}" placeholder="人物简介">${char.desc}</textarea>
      <div style="display:flex; justify-content:center; gap:8px; margin-top:10px;">
        <button class="save-edit-btn" onclick="saveInlineEdit(${charId})">保存修改</button>
        <button class="cancel-edit-btn-sm" onclick="cancelEditMode(${charId})">取消</button>
        <button onclick="deleteCharacter(${charId});event.stopPropagation();" 
                style="background:#c44545;color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;">
          删除
        </button>
      </div>
    `;

    infoArea.innerHTML = editHtml;
  });
}

    // 选择新头像
    function selectNewAvatar(charId) {
        editingCharId = charId;
        const fileInput = document.getElementById('editAvatarInput');
        fileInput.onchange = function(e) {
            tempAvatarFile = e.target.files[0];
            if (tempAvatarFile) {
                alert('已选择新头像，点击「保存修改」即可生效！');
            }
        };
        fileInput.click();
    }

    // 保存行内编辑（核心修改）
    function saveInlineEdit(charId) {
        const newName = document.getElementById(`editName_${charId}`).value.trim();
        const newDesc = document.getElementById(`editDesc_${charId}`).value.trim();
        
        if (!newName || !newDesc) {
            alert('姓名和简介不能为空！');
            return;
        }
        
        loadCharactersFromCOS(function(chars) {
            const index = chars.findIndex(c => c.id === charId);
            if (index === -1) {
                alert('未找到该人物！');
                cancelEditMode(charId);
                return;
            }
            
            // 1. 没有新头像：直接更新文字信息
            if (!tempAvatarFile) {
                chars[index].name = newName;
                chars[index].desc = newDesc;
                
                saveCharactersToCOS(chars, function(err) {
                    if (err) {
                        alert("修改失败：" + err.Message);
                    } else {
                        alert("修改成功！所有人都能看到更新后的信息～");
                        renderCharacters(); // 重新渲染列表
                        editingCharId = null;
                        tempAvatarFile = null;
                    }
                });
            } 
            // 2. 有新头像：先上传再更新
            else {
                uploadCharacterAvatar(tempAvatarFile, function(newAvatarUrl) {
                    chars[index].name = newName;
                    chars[index].desc = newDesc;
                    chars[index].avatar = newAvatarUrl;
                    
                    saveCharactersToCOS(chars, function(err) {
                        if (err) {
                            alert("修改失败：" + err.Message);
                        } else {
                            alert("头像和信息修改成功！所有人都能看到～");
                            renderCharacters(); // 重新渲染列表
                            editingCharId = null;
                            tempAvatarFile = null;
                        }
                    });
                });
            }
        });
    }

    // 取消编辑模式
    function cancelEditMode(charId) {
        editingCharId = null;
        tempAvatarFile = null;
        renderCharacters(); // 重新渲染恢复原样
    }

    // 渲染人物列表（核心修改）
    // 渲染人物列表（最终修复版）
function renderCharacters() {
  const grid = document.getElementById("charactersGrid");
  grid.innerHTML = "加载中...";

  loadCharactersFromCOS(function (characters) {
    grid.innerHTML = "";

    if (!characters || characters.length === 0) {
      grid.innerHTML = "<div class='no-characters'>暂无人物数据，点击上方表单添加第一个人物吧～</div>";
      return;
    }

    characters.forEach(char => {
      const card = document.createElement("div");
      card.className = "character-card";
      card.setAttribute("data-char-id", char.id);

      const formattedDesc = formatCharacterDesc(char.desc);

      card.innerHTML = `
        <img src="${char.avatar}" alt="${char.name}" class="character-avatar" 
             onerror="this.src='https://picsum.photos/300/200?random=${char.id}'">
        <div class="character-info">
          <div class="character-name" id="charName_${char.id}">${char.name}</div>
          <div class="character-desc">${formattedDesc}</div>
          <div style="margin-top:10px; color:#999; font-size:12px;">
            点击姓名即可编辑此人物信息
          </div>
        </div>
      `;

      grid.appendChild(card);

      // 绑定点击姓名进入编辑
      const nameEl = document.getElementById(`charName_${char.id}`);
      nameEl.style.cursor = "pointer";
      nameEl.onclick = function (e) {
        e.stopPropagation();
        enterEditMode(char.id);
      };
    });
  });
}

               // 点击卡片进入编辑
          
          const formattedDesc = formatCharacterDesc(char.desc);
          
          card.innerHTML = `
            <img src="${char.avatar}" alt="${char.name}" class="character-avatar" 
                 onerror="this.src='https://picsum.photos/300/200?random=${char.id}'">
            <div class="character-info">
              <div class="character-name">${char.name}</div>
              <div class="character-desc">${formattedDesc}</div>
              <div style="margin-top:10px; color:#999; font-size:12px;">
                点击卡片即可编辑此人物信息
              </div>
            </div>
          `;
          
          grid.appendChild(card);
        });
      });
    }

    // 添加新人物（保持原有逻辑）
    function addCharacter() {
      const name = document.getElementById("charName").value.trim();
      const desc = document.getElementById("charDesc").value.trim();
      const file = document.getElementById("charAvatar").files[0];

      if (!name) { alert("请输入姓名！"); return; }
      if (!desc) { alert("请输入简介！"); return; }
      if (!file) { alert("请选择头像图片！"); return; }

      uploadCharacterAvatar(file, function(avatarUrl) {
        loadCharactersFromCOS(function(characters) {
          characters.push({
            id: Date.now(),
            name: name,
            avatar: avatarUrl,
            desc: desc
          });
          saveCharactersToCOS(characters, function(err) {
            if (err) {
              alert("保存失败：" + err.Message);
            } else {
              alert("添加成功！所有人都能看到！");
              clearForm();
              renderCharacters();
            }
          });
        });
      });
    }

    // 清空表单（保持原有逻辑）
    function clearForm() {
        document.getElementById("charName").value = "";
        document.getElementById("charAvatar").value = "";
        document.getElementById("charDesc").value = "";
    }

    // 统一处理添加按钮点击
    function handleCharacterBtn() {
        addCharacter();
    }

    // 删除人物（保持原有逻辑）
    function deleteCharacter(characterId) {
      if (!confirm("确定删除该人物？删除后所有人都看不见！")) return;
      
      loadCharactersFromCOS(function(chars) {
        const newChars = chars.filter(c => c.id !== characterId);
        
        saveCharactersToCOS(newChars, function(err) {
          if (err) {
            alert("删除失败：" + err.Message);
          } else {
            alert("删除成功！");
            renderCharacters();
          }
        });
      });
    }

    // 显示人物页面
    function showCharacters() {
        hideAll();
        document.getElementById("characterPage").style.display = "block";
        document.getElementById("nav-characters").classList.add("active");
        renderCharacters();
    }

    // ====================== 图片墙 ======================
    const MAX_IMAGES = 100;
    const PER_PAGE = 30;
    let photos = [];
    let currentPage = 1;
    let replaceIndex = null;

    const photoContainer = document.getElementById('photoContainer');
    const pagination = document.getElementById('pagination');
    const fileInput = document.getElementById('fileInput');
    const previewOverlay = document.getElementById('previewOverlay');
    const previewImg = document.getElementById('previewImg');
    const homeContent = document.getElementById('homeContent');

    // 初始化图片列表
    function initPhotos() {
        photos = [...SHARED_PHOTOS];
        const saved = localStorage.getItem('savedPhotos');
        if (saved) {
            const localPhotos = JSON.parse(saved);
            const newPhotos = localPhotos.filter(img => !SHARED_PHOTOS.includes(img));
            photos = [...photos, ...newPhotos];
        }
        save();
        render();
    }

    // 保存图片列表到本地存储
    function save() {
        localStorage.setItem('savedPhotos', JSON.stringify(photos));
    }

    // 上传图片到COS
    function uploadToCOS(file, callback) {
        const fileName = "upload/" + Date.now() + "-" + file.name.replace(/[^a-zA-Z0-9_\.]/g, "");
        
        cos.putObject({
            Bucket: BUCKET,
            Region: REGION,
            Key: fileName,
            Body: file,
            onProgress: (progress) => {
                console.log("上传进度：", (progress.percent * 100).toFixed(1) + "%");
            }
        }, (err, data) => {
            if (err) {
                alert("上传失败：" + (err.message || 'CORS blocked or network error'));
                return;
            }
            const imgUrl = `https://${BUCKET}.cos.${REGION}.myqcloud.com/${fileName}`;
            callback(imgUrl);
        });
    }

    // 触发添加图片
    function triggerAdd() {
        if (photos.length >= MAX_IMAGES) {
            alert('最多 100 张');
            return;
        }
        fileInput.onchange = null;
        fileInput.onchange = function (e) {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                if (photos.length >= MAX_IMAGES) return;
                uploadToCOS(file, (imgUrl) => {
                    photos.push(imgUrl);
                    save();
                    setTimeout(() => render(), 50);
                    alert("图片上传成功！别人现在能看到啦～");
                });
            });
            e.target.value = '';
        };
        fileInput.click();
    }

    // 预览图片
    function openPreview(src) {
        previewImg.src = src;
        previewOverlay.style.display = "flex";
        keepPlayerVisible();
    }

    // 关闭图片预览
    function closePreview() {
        previewOverlay.style.display = "none";
    }

    // 替换图片
    function startReplace(index) {
        replaceIndex = index;
        fileInput.onchange = null;
        fileInput.onchange = function (e) {
            const f = e.target.files[0];
            if (!f) return;
            uploadToCOS(f, (imgUrl) => {
                photos[replaceIndex] = imgUrl;
                save();
                setTimeout(() => render(), 50);
                alert("图片替换成功！");
            });
            e.target.value = '';
        };
        fileInput.click();
    }

    // 渲染图片墙
    function render() {
        const totalPages = Math.ceil(photos.length / PER_PAGE);
        const start = (currentPage - 1) * PER_PAGE;
        const pageData = photos.slice(start, start + PER_PAGE);

        photoContainer.innerHTML = '';

        if (photos.length === 0) {
            photoContainer.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 50px; color: #999;">暂无图片</div>';
            pagination.innerHTML = '';
            return;
        }

        pageData.forEach((src, i) => {
            const idx = start + i;
            const card = document.createElement('div');
            card.className = 'photo-card';
            
            const div = document.createElement('div');
            div.className = 'photo-item';
            
            const img = document.createElement('img');
            img.src = src;
            img.alt = `photo-${idx}`;
            img.style.display = 'block';
            img.style.width = '100%';
            img.style.height = '100%';
            img.style.objectFit = 'cover';
            
            div.appendChild(img);
            div.onclick = () => openPreview(src);
            div.oncontextmenu = e => {
                e.preventDefault();
                if (confirm('确定删除这张图片？')) {
                    photos.splice(idx, 1);
                    save();
                    render();
                }
            };

            const btn = document.createElement('button');
            btn.className = 'replace-btn';
            btn.innerText = '替换';
            btn.onclick = () => startReplace(idx);

            card.appendChild(div);
            card.appendChild(btn);
            photoContainer.appendChild(card);
        });

        // 渲染分页
        pagination.innerHTML = '';
        for (let p = 1; p <= totalPages; p++) {
            const btn = document.createElement('button');
            btn.textContent = p;
            if (p === currentPage) btn.classList.add('active');
            btn.onclick = () => {
                currentPage = p;
                render();
            };
            pagination.appendChild(btn);
        }
    }

    // ====================== 初始化 ======================
    createStars();
    calcDays();
    initPhotos();
    showHome();

const EVENT_DATA_PATH = "data/events.json";
const EVENT_IMG_FOLDER = "events/";
let editingEventId = null;

// 加载事件
function loadEventsFromCOS(callback) {
  cos.getObject({
    Bucket: BUCKET,
    Region: REGION,
    Key: EVENT_DATA_PATH
  }, function(err, data) {
    if (err) callback([]);
    else {
      try { callback(JSON.parse(data.Body)); } 
      catch (e) { callback([]); }
    }
  });
}

// 保存事件
function saveEventsToCOS(events, callback) {
  cos.putObject({
    Bucket: BUCKET,
    Region: REGION,
    Key: EVENT_DATA_PATH,
    Body: JSON.stringify(events, null, 2),
    ContentType: "application/json"
  }, callback);
}

// 上传事件图片
function uploadEventImg(file, callback) {
  const ext = file.name.split('.').pop();
  const fn = EVENT_IMG_FOLDER + Date.now() + "-" + Math.random().toString(36).substr(2,6) + "." + ext;
  cos.putObject({
    Bucket: BUCKET,
    Region: REGION,
    Key: fn,
    Body: file
  }, function(err, data) {
    if (err) { alert("上传失败："+err.Message); return; }
    callback(`https://${BUCKET}.cos.${REGION}.myqcloud.com/${fn}`);
  });
}

// 添加/编辑事件
function addEvent() {
  const date = document.getElementById('eventDate').value.trim();
  const title = document.getElementById('eventTitle').value.trim();
  const content = document.getElementById('eventContent').value.trim();
  const file = document.getElementById('eventImg').files[0];

  if (!date || !title || !content) {
    alert("日期、标题、内容不能为空！");
    return;
  }

  // 有图片先上传图片，再保存事件
  if (file) {
    uploadEventImg(file, (imgUrl) => {
      saveOneEvent(date, title, content, imgUrl);
    });
  } else {
    saveOneEvent(date, title, content, "");
  }
}

// 保存单个事件（新增/编辑通用）
function saveOneEvent(date, title, content, img) {
  loadEventsFromCOS(function(events) {
    // 编辑模式：更新现有事件
    if (editingEventId) {
      const index = events.findIndex(e => e.id === editingEventId);
      if (index !== -1) {
        events[index].date = date;
        events[index].title = title;
        events[index].content = content;
        if (img) events[index].img = img; // 只有传了新图片才更新
      }
    } else {
      // 新增模式：插入到最前面（最新事件在顶部）
      events.unshift({
        id: Date.now(),
        date: date,
        title: title,
        content: content,
        img: img
      });
    }

    // 保存到COS
    saveEventsToCOS(events, function(err) {
      if (err) alert("保存失败："+err.Message);
      else {
        alert(editingEventId ? "事件修改成功！" : "事件发布成功！");
        clearEventForm();
        renderEvents();
      }
    });
  });
}

// 清空事件表单
function clearEventForm() {
  document.getElementById('eventDate').value = '';
  document.getElementById('eventTitle').value = '';
  document.getElementById('eventContent').value = '';
  document.getElementById('eventImg').value = '';
  editingEventId = null;
}

// 渲染时间轴
function renderEvents() {
  const timeline = document.getElementById('timeline');
  loadEventsFromCOS(function(events) {
    if (!events || events.length === 0) {
      timeline.innerHTML = '<div class="no-events">暂无大事件，添加第一个里程碑吧～</div>';
      return;
    }
    timeline.innerHTML = '';
    // 遍历事件生成时间轴
    events.forEach(ev => {
      const item = document.createElement('div');
      item.className = 'timeline-item';
      item.innerHTML = `
        <div class="timeline-date">${ev.date}</div>
        <div class="timeline-title">${ev.title}</div>
        ${ev.img ? `<img src="${ev.img}" class="timeline-img" onclick="openPreview('${ev.img}')">` : ''}
        <div class="timeline-content">${ev.content}</div>
        <div class="timeline-btns">
          <button class="btn-edit" onclick="editEvent(${ev.id})">编辑</button>
          <button class="btn-del" onclick="deleteEvent(${ev.id})">删除</button>
        </div>
      `;
      timeline.appendChild(item);
    });
  });
}

// 编辑事件
function editEvent(id) {
  loadEventsFromCOS(function(events) {
    const ev = events.find(e => e.id === id);
    if (!ev) return;
    // 填充表单
    document.getElementById('eventDate').value = ev.date;
    document.getElementById('eventTitle').value = ev.title;
    document.getElementById('eventContent').value = ev.content;
    editingEventId = id;
    alert("已加载事件到表单，修改后点击【添加事件】即可更新！");
  });
}

// 删除事件
function deleteEvent(id) {
  if (!confirm("确定删除此事件？删除后无法恢复！")) return;
  loadEventsFromCOS(function(events) {
    const filtered = events.filter(e => e.id !== id);
    saveEventsToCOS(filtered, function(err) {
      if (err) alert("删除失败：" + err.Message);
      else {
        alert("删除成功！");
        renderEvents();
      }
    });
  });
}

// 显示大事件页面
function showEvents() {
  hideAll();
  document.getElementById('eventsPage').style.display = 'block';
  document.getElementById('nav-events').classList.add('active');
  renderEvents();
}
</script>
